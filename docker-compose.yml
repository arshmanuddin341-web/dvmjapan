# Local PostgreSQL for Tradeware UI (Prisma)
# Run: docker-compose up -d
# Stop: docker-compose down

services:
  db:
    image: postgres:16-alpine
    container_name: tradeware-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradeware
    ports:
      - "5432:5432"
    volumes:
      - tradeware_pgdata:/var/lib/postgresql/data

volumes:
  tradeware_pgdata:
